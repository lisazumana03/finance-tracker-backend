# Application Configuration
spring.application.name=FinanceTracker

# Server Configuration
server.port=4047
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/finance_tracker
spring.data.mongodb.auto-index-creation=true

# Jackson Configuration (JSON Serialization)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,beans
management.endpoint.health.show-details=always
management.health.mongo.enabled=true

# Logging Configuration
logging.level.root=INFO
logging.level.za.co.lzinc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.data=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2000

# Spring Web Configuration
spring.web.resources.cache.period=3600

# Validation Configuration
spring.validation.enabled=true